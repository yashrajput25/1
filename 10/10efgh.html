<!DOCTYPE html>
<html>

<head>
    <style>
        
        button{
            background-color: rgb(230,230,230);
            border:none;
            border-radius: 7px;
            font-size:15px;
            padding:10px 20px;
            margin: 5px;
            cursor: pointer;
        }

        .enabled-button{
            background-color: black;
            color: white;
            cursor: pointer;
        }

    </style>

</head>

    <body>
        <button class="js-button-1" onclick='updateButton(this)'>Gaming</button>
        <button class="js-button-2" onclick='updateButton(this)'>Music</button>
        <button class="js-button-3" 
        onclick="updateButton(this)">Tech</button>
        <script>

        function updateButton(buttonElement){
                if(buttonElement.classList.contains("enabled-button"))
                {
                    buttonElement.classList.remove("enabled-button")
                }else{
                    buttonElement.classList.add("enabled-button")
                }
            }

        </script>
    </body>


</html>
