<!DOCTYPE html>

<html>

<head>

</head>

<body>

    <p>Rock Paper Scissors</p>

<button onclick="playedRock()">
    Rock
</button>

<button onclick="playedPaper()">
    Paper
</button>

<button onclick="playedScissor()">
    Scissors
</button>

<p class="js-result-element"></p>

<p class="js-moves-element"></p>

<p class="js-score-element"></p>

<button onclick="resetScore()">
    Reset Score
</button>

</body>
<script>

    const scoreElement = document.querySelector('.js-score-element')
    const resultElement = document.querySelector('.js-result-element')
    const moveElement = document.querySelector('.js-moves-element')
    let result, computerMove;

    const score = JSON.parse(localStorage.getItem('score')) || {
        win: 0,
        loss: 0,
        tie: 0
    }

    scoreElement.innerHTML = `win : ${score.win} , loss: ${score.loss} , tie: ${score.tie}`


    function getRandomMove(){
        const moves = ["Rock", "Paper", "Scissors"];
        let moveIndex = Math.floor(Math.random()*moves.length);
        let computerMove = moves[moveIndex];
        return computerMove;
    }

    function playedRock(){
        computerMove = getRandomMove();
        console.log(computerMove);
        if(computerMove === 'Rock'){
            score.tie++;
            result = 'tie'
        }else if(computerMove === 'Paper'){
            score.loss++;
            result = 'loss'
            
        }else{
            score.win++;
            result = 'win'
        }
        updateScore('rock')
        alert(`You chose Rock. Computer chose ${computerMove}. Result: ${result} \n wins: ${score.win} , ties:  ${score.tie}, losses: ${score.loss}
        `)
    }

    function playedScissor(){
        computerMove = getRandomMove();
        if(computerMove === 'Rock'){
            score.loss++;
            result = 'loss'
        
        }else if(computerMove === 'Paper'){
            score.win++;
            result= 'win'
            
        }else{
            score.tie++;
            result = 'tie';
        }
        updateScore('scissors')
        alert(`You chose Scissors. Computer chose ${computerMove}. Result: ${result} \n
wins: ${score.win} , ties:  ${score.tie}, losses: ${score.loss}
        `)
    }

    function playedPaper(){
        computerMove = getRandomMove();
        if(computerMove === 'Rock'){
            score.win++;
            result = 'win'
            
        }else if(computerMove === 'Paper'){
            score.tie++;
            result = 'tie'
            
        }else{
            score.loss++;
            result = 'loss'
        }
        updateScore('paper')
        alert(`You chose Paper. Computer chose ${computerMove}. Result: ${result} \n
wins: ${score.win} , ties:  ${score.tie}, losses: ${score.loss}
        `)
    }


    function updateScore(user_move){
        localStorage.setItem('score', JSON.stringify(score))
        moveElement.innerHTML = `Your move : ${user_move}, Computer's move : ${computerMove}`
        resultElement.innerHTML = (result ==='win' ||result === 'loss' )? `You ${result}` : `It's a ${result}`
        scoreElement.innerHTML = `win : ${score.win} , loss: ${score.loss} , tie: ${score.tie}`
    }

    function resetScore(){
        score.win = 0, score.loss = 0, score.tie = 0;
        localStorage.setItem('score', JSON.stringify(score))
        scoreElement.innerHTML = `win : ${score.win} , loss: ${score.loss} , tie: ${score.tie}`
        alert(`Score Reset! \n
wins: ${score.win} , ties:  ${score.tie}, losses: ${score.loss}`)
    }



</script>



</html>
