<!DOCTYPE html>
<html>
    <head>

    </head>

    <body>

        <p>Guess the result of the coin</p>
        <button onclick="tossCoins('Heads')">
            Heads
        </button>
        <button onclick="tossCoins('Tails')">
            Tails
        </button>

        <script>

            
            const score = JSON.parse(localStorage.getItem('score')) || {
                wins: 0,
                losses: 0
            };

            

            function tossCoins(value){
                let randomNumber = Math.random()
                
                let result = randomNumber < 0.5 ? 'Heads' : 'Tails'
                console.log(result)

                if(value === result){
                    score.wins++;
                }else{
                    score.losses++;
                }

                const {wins, losses} = score 
                
                alert( `You guessed ${value}, and the result on flip was ${result}
                wins: ${wins}
                losses: ${losses}`) 
            
            console.log(localStorage.setItem('score',JSON.stringify(score)))
            }
            

        </script>
    </body>


</html>
