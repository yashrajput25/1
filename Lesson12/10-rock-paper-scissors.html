    <!DOCTYPE html>
    <html>
    <head>
        <title>Rock Paper Scissors</title>
        <link rel="stylesheet" href="10-rock-paper-scissors.css">


    </head>
    <body>
        <p class="title">Rock Paper Scissors</p>
        <button class="move-button js-rock-button" >
        <img class="move-icon" src="./assets/rock-emoji.png" alt=""></button>

        <button class="move-button js-paper-button">
        <img class="move-icon" src="./assets/paper-emoji.png" alt=""></button>

        <button class="move-button js-scissors-button">
        <img class="move-icon" src="./assets/scissors-emoji.png" alt=""></button>

        <p class="js-result result">
        </p>
        <p class="js-moves moves"></p>
        <p class="js-score scores"></p>

        <button onclick="
        score.wins = 0;
        score.losses = 0;
        score.ties = 0;
        localStorage.removeItem('score');
        updateScoreElement();
        "
        class="reset-button">Reset Score</button>

        <button class="auto-play-button js-auto-play" onclick="autoPlay()">
            Auto Play
        </button>

        <script src="10-rock-paper-scissors.js"></script>
    </body>
    </html>
