    <!DOCTYPE html>
    <html>
    <head>
    <title>Cart Quantity</title>
    </head>
    <body>
    <button onclick="
        console.log(`Cart quantity: ${cartQuantity}`);
    ">Show Quantity</button>

    <button onclick="
        updateCartQuantity(1, 'add')
        console.log(`Cart quantity: ${cartQuantity}`);
        
    ">Add to Cart</button>

    <button onclick="
        updateCartQuantity(2, 'add')
        console.log(`Cart quantity: ${cartQuantity}`);
        
    ">+2</button>

    <button onclick="
        updateCartQuantity(3, 'add')
        console.log(`Cart quantity: ${cartQuantity}`);
        
    ">+3</button>

    <button onclick="
        updateCartQuantity(4, 'add')
        console.log(`Cart quantity: ${cartQuantity}`);
        
    ">+4</button>

    <button onclick="
        updateCartQuantity(5, 'add')
        console.log(`Cart quantity: ${cartQuantity}`);
        
    ">+5</button>

    <!-- vvv This code was changed. vvv -->
    <button onclick="
        updateCartQuantity(1, 'remove')
        console.log(`Cart quantity: ${cartQuantity}`);
    ">Remove from cart</button>

    <button onclick="
        updateCartQuantity(2, 'remove')
        console.log(`Cart quantity: ${cartQuantity}`);
    ">-2</button>

    <button onclick="
        updateCartQuantity(3, 'remove')
        console.log(`Cart quantity: ${cartQuantity}`);
    ">-3</button>
    <!-- ^^^ This code was changed. ^^^ -->

    <button onclick="
        cartQuantity = 0;
        console.log('Cart was reset.');
        console.log(`Cart quantity: ${cartQuantity}`);
    ">Reset Cart</button>

    <script>
        let cartQuantity = 0;

        function updateCartQuantity(value, operation){

            if(operation === 'add'){

                if(cartQuantity + value > 10){
                    alert("The cart is full")
                    return;
                }else{
                    cartQuantity+=value;
                }
            }else{

                if(cartQuantity - value < 0){
                    alert("Not enought items in cart")
                    return;
                }else{
                    cartQuantity=-value
                }
            }

        }
    </script>
    </body>
    </html>
