    <body>
        <script>
            function convertToFahrenheit(value){
                return (value*(9/5))+ 32
            }

            function convertToCelcius(value){
                return (value-32) * (5/9)
            }

            function  convertToTemperature(value, unit){
                return unit === 'C' ? convertToCelcius(value) : convertToFahrenheit(value)
            }

            console.log(convertToTemperature(25,'F'))

        </script>    
    </body>
